<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting...</title>
  <meta http-equiv="refresh" content="0; url=/snowpeak/index.html">
  <script>
    // Keep query/hash when redirecting from a 404 path.
    var target = "/snowpeak/index.html" + window.location.search + window.location.hash;
    window.location.replace(target);
  </script>
</head>
<body>
  <p>Redirecting to <a href="/snowpeak/index.html">/snowpeak/index.html</a>...</p>
</body>
</html>
